services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    shm_size: 128mb
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis
    container_name: redis_db
    restart: always
    ports:
      - "6379:6379"
    volumes: 
      - redis_data:/data 
  
volumes: 
  postgres_data:
  redis_data:

